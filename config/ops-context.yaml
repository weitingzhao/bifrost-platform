# Bifrost Ops Platform — context spine (authoritative for milestones & decisions).
# Console Program/Pulse and Copy-for-LLM merge this file via GET /api/v1/context.
# Detail: bifrost-trade-infra/docs/LOCAL_PROD_FINAL_SIGNOFF.md L3

meta:
  version: "2026-06-15"
  catalog_version: "2026-06-15"

# Ultimate goal (Strategy C hybrid) — authoritative for Agent / Program UI.
# Detail: bifrost-platform/docs/NORTH_STAR.md · decision D6
north_star:
  id: ops-ui-single-pane
  statement: >
    All environment, cluster, release, and routine ops actions are performed through
    Bifrost Ops Console and platform-api. The Owner only restarts the Ops Platform
    process outside the UI (cold start / control-plane upgrade).
  strategy: hybrid_c
  principles:
    - "Single pane — Console + platform-api (+ future MCP) is the only interaction surface"
    - "Scripts are executors behind API — not operator runbooks; no routine ssh/kubectl/Makefile"
    - "L0/L1/L2 actuation with audit; identical contract for human UI and AI Agent"
    - "Hybrid backends — client-go, Argo CD, Tekton, SSH whitelist; embed mature tools, do not fork K8s UIs"
  owner_exception: "Restart bifrost-platform (make start) when control plane is down or upgraded"
  authority: bifrost-platform/docs/NORTH_STAR.md
  success_criteria:
    - "Cluster join/drain/workload/gitops runnable from Cluster + Delivery pages only"
    - "Program page and GET /api/v1/context expose north_star on every Agent session"
    - "MCP Tools mirror UI capabilities with same auth and audit trail"

