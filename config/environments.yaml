# Registered Bifrost Trade environments for connectivity matrix (Phase 0).
# Override nginx_base via env-specific .env on the platform host if needed.

environments:
  - id: dev
    label: Development
    nginx_base: http://192.168.10.73:30882
    ingress_host: trade-dev.bifrost.lan
    ingress_node_ip: 192.168.10.73
    # CNPG @ data NS (legacy bare-metal .80 decommissioned 2026-06-29)
    postgres:
      host: bifrost-postgres-rw.data.svc.cluster.local
      port: 5432
    # K3s dev uses in-cluster redis (gate checks via cluster probe).
    redis:
      host: redis-dev.data.svc.cluster.local
      port: 6379
    ops_token_env: BIFROST_DEV_OPS_TOKEN

  - id: stg
    label: Staging
    nginx_base: http://192.168.10.73:30880
    ingress_host: trade-stg.bifrost.lan
    ingress_node_ip: 192.168.10.73
    postgres:
      host: bifrost-postgres-rw.data.svc.cluster.local
      port: 5432
    redis:
      host: redis-live-stg.data.svc.cluster.local
      port: 6379
    ops_token_env: BIFROST_STG_OPS_TOKEN

  - id: prod
    label: Production
    # W2 Traefik Ingress — Host trade.bifrost.lan @ K3s prod node :80
    nginx_base: http://192.168.10.70
    ingress_host: trade.bifrost.lan
    ingress_node_ip: 192.168.10.70
    # CNPG @ data NS (legacy bare-metal .80 decommissioned 2026-06-29)
    postgres:
      host: bifrost-postgres-rw.data.svc.cluster.local
      port: 5432
    # Legacy compose exposed host Redis; K3s prod uses in-cluster redis (gate checks via cluster probe).
    redis:
      host: redis-live-prod.data.svc.cluster.local
      port: 6379
    ops_token_env: BIFROST_PROD_OPS_TOKEN
