site_name: Bifrost Ops Platform
site_description: Docs staging — draft notes & future plans (authoritative governance is in Ops Console Architecture)
site_url: http://127.0.0.1:8060/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Staging policy: STAGING.md
  - Overview: overview.md
  - Agent (Phase B): agent/README.md
  - MCP (Phase P2): mcp/README.md
